<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jangoa - Goa's Voice | लोकांचं मत, आमचा आवाज</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#c0160e;--red-dark:#8e100a;--gold:#e8a020;--blue:#1565c0;--green:#2e7d32;--purple:#6a1b9a;--orange:#e65100;--text:#1a1a1a;--muted:#666;--border:#e0e0e0;--bg:#f4f4f0;--white:#fff;--shadow:0 2px 8px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text)}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
.hidden{display:none!important}

/* TOPBAR */
.topbar{background:var(--red-dark);color:#ffcccc;font-size:12px;padding:5px 0}
.topbar-in{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center}
.topbar a{color:#ffaaaa;margin-left:14px}
.topbar a:hover{color:#fff}

/* TICKER */
.ticker{background:var(--red);color:#fff;display:flex;align-items:center;height:34px;overflow:hidden}
.tick-lbl{background:var(--gold);color:#111;font-weight:700;font-size:11px;padding:0 14px;height:100%;display:flex;align-items:center;letter-spacing:1px;flex-shrink:0}
.tick-track{overflow:hidden;flex:1;padding:0 12px}
.tick-inner{display:inline-block;white-space:nowrap;animation:tick 45s linear infinite;font-size:13px}
.tick-inner span{margin-right:50px}
.tick-inner span::before{content:"● ";color:var(--gold)}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HEADER */
header{background:#fff;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.hdr-in{max-width:1200px;margin:0 auto;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-wrap img{height:58px;width:58px;border-radius:10px;object-fit:cover}
.logo-txt h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--red);font-weight:900;line-height:1}
.logo-txt p{font-size:11px;color:var(--muted);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.search-wrap{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:20px;overflow:hidden;background:var(--bg)}
.search-wrap input{border:none;background:transparent;padding:7px 14px;font-size:13px;outline:none;width:170px;font-family:inherit}
.search-wrap button{background:var(--red);border:none;color:#fff;padding:7px 13px;cursor:pointer;font-size:13px}
.admin-btn{background:var(--red-dark);color:#fff;border:none;padding:8px 14px;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit}
.admin-btn:hover{background:#6a0a07}

/* NAV */
nav{background:var(--red)}
.nav-in{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;overflow-x:auto;scrollbar-width:none}
.nav-in::-webkit-scrollbar{display:none}
nav a{color:#fff;font-size:13px;font-weight:600;padding:11px 15px;white-space:nowrap;display:block;transition:background .2s;border-bottom:3px solid transparent}
nav a:hover{background:rgba(0,0,0,0.18)}
nav a.active{background:rgba(0,0,0,0.2);border-bottom:3px solid var(--gold)}

/* CONTAINER */
.wrap{max-width:1200px;margin:0 auto;padding:0 16px}

/* SEC HEADING */
.sec-h{display:flex;align-items:center;gap:12px;margin:24px 0 16px}
.sec-h h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;white-space:nowrap}
.sec-h hr{flex:1;border:none;border-top:2px solid var(--border);position:relative}
.sec-h .line-accent{width:60px;height:2px;background:var(--red);margin-bottom:-2px}

/* HERO */
.hero{display:grid;grid-template-columns:1fr 330px;gap:18px;padding:20px 0 16px}
.hero-main{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;background:#222}
.hero-main .bg-img{width:100%;height:380px;object-fit:cover}
.hero-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.88));padding:28px 18px 18px;color:#fff}
.hero-ov .badge{display:inline-block;background:var(--red);font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:3px;margin-bottom:8px;text-transform:uppercase}
.hero-ov h2{font-family:'Playfair Display',serif;font-size:22px;line-height:1.3;margin-bottom:6px}
.hero-ov p{font-size:13px;opacity:.85;line-height:1.5}
.hero-ov .meta{margin-top:8px;font-size:11px;opacity:.7}
.hero-side{display:flex;flex-direction:column;gap:12px}
.ss{background:#fff;border-radius:8px;overflow:hidden;display:grid;grid-template-columns:100px 1fr;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s}
.ss:hover{transform:translateY(-2px)}
.ss .bg-img{width:100px;height:82px;object-fit:cover}
.ss-txt{padding:9px 11px}
.ss-txt .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.ss-txt h3{font-size:13px;line-height:1.4;font-weight:600}
.ss-txt .meta{font-size:11px;color:var(--muted);margin-top:4px}

/* GRID */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px}
.nc{background:#fff;border-radius:8px;overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.nc:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.12)}
.nc .bg-img{width:100%;height:170px;object-fit:cover}
.nc-body{padding:13px}
.nc-body .badge{display:inline-block;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.nc-body h3{font-size:14px;font-weight:600;line-height:1.45;margin-bottom:7px}
.nc-body p{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:9px}
.nc-body .meta{font-size:11px;color:#999;display:flex;justify-content:space-between}

/* CONTENT LAYOUT */
.cl{display:grid;grid-template-columns:1fr 290px;gap:24px;margin-bottom:36px}

/* LIST STORY */
.ls{display:grid;grid-template-columns:120px 1fr;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ls:last-child{border-bottom:none}
.ls:hover h3{color:var(--red)}
.ls .bg-img{width:120px;height:85px;object-fit:cover;border-radius:6px}
.ls-txt .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.ls-txt h3{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:5px;transition:color .2s}
.ls-txt p{font-size:12px;color:var(--muted);line-height:1.5}
.ls-txt .meta{font-size:11px;color:#999;margin-top:5px}

/* SIDEBAR */
.sw{background:#fff;border-radius:8px;overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
.sw-hdr{background:var(--red);color:#fff;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 14px}
.sw-body{padding:12px}
.trend-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:flex-start}
.trend-item:last-child{border-bottom:none}
.trend-item:hover h4{color:var(--red)}
.trend-num{font-size:20px;font-weight:900;color:#e8d0cf;min-width:26px;line-height:1;font-family:'Playfair Display',serif}
.trend-item h4{font-size:12px;font-weight:600;line-height:1.4;transition:color .2s}
.trend-item span{font-size:10px;color:#999;display:block;margin-top:2px}
.ad-box{background:#f0f0ee;border:1px dashed #ccc;border-radius:6px;text-align:center;padding:18px;color:#aaa;font-size:12px;margin-bottom:18px;line-height:1.7}

/* ARTICLE PAGE */
.art-pg{max-width:820px;margin:0 auto;padding:24px 16px 48px}
.art-pg .badge{display:inline-block;color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:3px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.art-pg h1{font-family:'Playfair Display',serif;font-size:30px;line-height:1.3;margin-bottom:12px}
.art-byline{font-size:13px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.art-pg .hero-img{width:100%;border-radius:8px;max-height:420px;object-fit:cover;margin-bottom:8px}
.art-pg figcaption{font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px}
.art-pg .body{font-size:16px;line-height:1.85;color:var(--text)}
.art-pg .body p{margin-bottom:16px}
.art-pg .body h3{font-family:'Playfair Display',serif;font-size:20px;margin:22px 0 10px}
.art-pg .body blockquote{border-left:4px solid var(--red);padding:10px 18px;margin:18px 0;background:#fdf5f5;font-style:italic;color:#444}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:600;margin:14px 0 0 16px;cursor:pointer;border:none;font-family:inherit}
.back-btn:hover{background:var(--red-dark)}

/* PAGE HERO BANNER */
.pg-banner{background:linear-gradient(135deg,var(--red-dark),var(--red));color:#fff;padding:32px 0 28px;margin-bottom:0}
.pg-banner h1{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:6px}
.pg-banner p{opacity:.85;font-size:14px}
.pg-banner .breadcrumb{font-size:12px;opacity:.7;margin-bottom:8px}

/* ABOUT PAGE */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin:28px 0}
.about-card{background:#fff;border-radius:10px;padding:24px;box-shadow:var(--shadow)}
.about-card h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:12px;color:var(--red)}
.about-card p{font-size:14px;line-height:1.8;color:var(--muted)}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:20px 0}
.team-card{background:#fff;border-radius:10px;padding:20px;text-align:center;box-shadow:var(--shadow)}
.team-av{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;margin:0 auto 12px;font-family:'Playfair Display',serif}
.team-card h4{font-size:15px;font-weight:700;margin-bottom:4px}
.team-card p{font-size:12px;color:var(--muted)}
.team-card .role{font-size:12px;color:var(--red);font-weight:600;margin-bottom:6px}

/* CONTACT PAGE */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin:24px 0}
.contact-form input,.contact-form textarea,.contact-form select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;margin-bottom:14px;outline:none;transition:border .2s}
.contact-form input:focus,.contact-form textarea:focus{border-color:var(--red)}
.contact-form textarea{height:130px;resize:vertical}
.contact-form .sub-btn{background:var(--red);color:#fff;border:none;padding:12px 28px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.contact-form .sub-btn:hover{background:var(--red-dark)}
.contact-info-card{background:#fff;border-radius:10px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
.contact-info-card h3{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--red)}
.ci-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;font-size:14px}
.ci-icon{width:36px;height:36px;background:#fdecea;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ci-row p{color:var(--muted);line-height:1.6}
.ci-row strong{display:block;color:var(--text)}

/* VIDEO PAGE */
.video-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px}
.vid-card{background:#fff;border-radius:8px;overflow:hidden;cursor:pointer;box-shadow:var(--shadow)}
.vid-thumb{position:relative}
.vid-thumb .bg-img{width:100%;height:160px;object-fit:cover}
.vid-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(192,22,14,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.vid-body{padding:12px}
.vid-body h3{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:6px}
.vid-body .meta{font-size:11px;color:#999}

/* FOOTER */
footer{background:#111;color:#ccc;padding:40px 0 16px;margin-top:40px}
.ft-grid{max-width:1200px;margin:0 auto;padding:0 16px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:28px;margin-bottom:28px}
.ft-about img{height:46px;border-radius:8px;margin-bottom:12px}
.ft-about h3{color:#fff;font-family:'Playfair Display',serif;font-size:18px;margin-bottom:8px}
.ft-about p{font-size:13px;color:#aaa;line-height:1.7}
.ft-col h4{color:#fff;font-size:13px;font-weight:700;margin-bottom:12px;letter-spacing:.5px;border-bottom:2px solid var(--red);padding-bottom:7px;display:inline-block}
.ft-col ul{list-style:none}
.ft-col ul li{margin-bottom:7px}
.ft-col ul li a{font-size:13px;color:#aaa;transition:color .2s}
.ft-col ul li a:hover{color:#fff}
.socials{display:flex;gap:9px;margin-top:12px}
.socials a{background:#333;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:background .2s}
.socials a:hover{background:var(--red)}
.ft-bottom{max-width:1200px;margin:0 auto;padding:14px 16px 0;border-top:1px solid #333;display:flex;justify-content:space-between;font-size:12px;color:#555;flex-wrap:wrap;gap:8px}

/* IMAGE PLACEHOLDER */
.bg-img{display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.9);font-size:11px;font-weight:700;text-align:center;padding:6px;letter-spacing:.5px;line-height:1.4}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{grid-template-columns:1fr}
  .news-grid{grid-template-columns:1fr 1fr}
  .cl{grid-template-columns:1fr}
  .ft-grid{grid-template-columns:1fr 1fr}
  .about-grid,.contact-grid,.team-grid{grid-template-columns:1fr}
  .video-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:580px){
  .news-grid,.video-grid{grid-template-columns:1fr}
  .ft-grid{grid-template-columns:1fr}
  .logo-txt h1{font-size:21px}
  .topbar{display:none}
  .search-wrap input{width:110px}
}
</style>
</head>

  {id:1,cat:"goa",title:"Goa Government Announces ₹500 Crore Smart City Plan for Panaji",summary:"The Goa state government unveiled an ambitious Smart City initiative for Panaji, promising upgraded roads, digital infrastructure, and eco-friendly public transport by 2026.",body:"<p>The Goa state government on Wednesday announced a comprehensive ₹500 crore Smart City Development Plan for Panaji, the state capital, aiming to transform it into one of India's most digitally advanced cities by 2026.</p><p>Chief Minister Dr. Pramod Sawant said the plan covers road widening, underground cabling, smart traffic signals, and electric buses across major city routes.</p><h3>Key Highlights</h3><p>Phase one will invest ₹150 crore in upgrading Panaji's road network, with special attention to the Patto Bridge and DB Marg corridors. A dedicated cycling track will also be built along the Mandovi River waterfront.</p><p>Phase two covers digital infrastructure — free Wi-Fi in all public squares, 1,000 CCTV cameras, and a centralised command centre.</p><blockquote>&quot;This is a historic investment in the future of Goa.&quot; — Chief Minister Dr. Pramod Sawant</blockquote><p>Environmentalists broadly welcomed the announcement, calling it a step toward sustainable urban growth in Goa.</p>",author:"Jangoa Desk",date:"May 28, 2026",readTime:"4 min read",imgLabel:"PANAJI SMART CITY",featured:true},
  {id:2,cat:"politics",title:"Opposition Demands CBI Probe into Goa Mining Lease Renewals",summary:"Congress and AAP jointly demand a CBI inquiry into alleged irregularities in the renewal of iron ore mining leases in South Goa.",body:"<p>The opposition parties in Goa, led by the Congress and AAP, formally demanded a CBI probe into alleged irregularities in the renewal of iron ore mining leases in South Goa on Tuesday.</p><p>Congress leader Yuri Alemão alleged that leases were renewed without environmental clearances, violating Supreme Court orders.</p><h3>Government Responds</h3><p>The state government categorically denied the allegations. Mining Minister Nilesh Cabral stated all renewals complied fully with the law.</p><p>The mining sector has long been contentious in Goa, with operations suspended by the Supreme Court in 2018 following an illegal extraction inquiry.</p>",author:"Political Bureau",date:"May 27, 2026",readTime:"5 min read",imgLabel:"GOA POLITICS",featured:false},
  {id:3,cat:"sports",title:"FC Goa Clinches ISL Trophy in Thrilling Extra-Time Victory Over Mumbai City",summary:"In a heart-stopping ISL final at Fatorda, FC Goa defeated Mumbai City FC 3-2 after extra time, bringing the trophy home for the first time.",body:"<p>FC Goa produced a stunning comeback to defeat Mumbai City FC 3-2 in extra time in the ISL final at Jawaharlal Nehru Stadium, Fatorda before a capacity crowd of 22,000 roaring fans.</p><p>Mumbai City took an early two-goal lead, but FC Goa's talisman Brandon Fernandes pulled one back before halftime with a stunning long-range effort.</p><h3>Goa Erupts in Celebration</h3><p>Noah Sadaoui equalised in the 78th minute before Edu Bedia scored the dramatic winner in the 104th minute.</p><p>Thousands of fans poured onto the streets of Panaji and Margao in jubilant celebration. Chief Minister Pramod Sawant announced a cash prize of ₹1 crore for the squad.</p><blockquote>&quot;The fans were the 12th man tonight.&quot; — Head Coach Manolo Márquez</blockquote>",author:"Sports Desk",date:"May 26, 2026",readTime:"4 min read",imgLabel:"FC GOA ISL CHAMPIONS",featured:false},
  {id:4,cat:"entertainment",title:"Sunburn Festival 2026 Returns to Vagator Beach with 80 International Artists",summary:"Asia's largest music festival announces its return to Goa this December with a star-studded lineup across 5 stages over three days.",body:"<p>Sunburn Festival 2026 is set to return to Vagator Beach in North Goa this December, with 80 international and domestic artists performing across five stages over three days.</p><p>Headline acts include Martin Garrix and homegrown sensation KSHMR. The festival draws over 75,000 attendees annually.</p><h3>New Attractions This Year</h3><p>A dedicated Konkani music stage celebrates local Goan culture. A sustainability zone pledges the festival will be 40% plastic-free.</p><p>Tickets go on sale June 15 on the official Sunburn website.</p>",author:"Entertainment Desk",date:"May 25, 2026",readTime:"3 min read",imgLabel:"SUNBURN FESTIVAL GOA",featured:false},
  {id:5,cat:"business",title:"Goa Tourism Revenue Crosses ₹10,000 Crore Milestone for First Time",summary:"Goa's tourism sector hit a historic milestone, with revenue crossing ₹10,000 crore in FY 2025-26, driven by domestic tourists and luxury hospitality growth.",body:"<p>Goa's tourism sector crossed the ₹10,000 crore revenue mark for the first time in FY 2025-26, according to the Goa Tourism Development Corporation.</p><p>Tourism Minister Rohan Khaunte called it a testament to Goa's appeal as a year-round destination. Domestic tourists from Tier 2 and 3 cities drove the surge, with luxury hospitality growing 34% year-on-year.</p><h3>Challenges Ahead</h3><p>Industry bodies flagged concerns over overtourism at Baga and Calangute beaches. The government is exploring a tourist carrying capacity policy for sustainable growth.</p><p>The state aims for ₹15,000 crore by 2028 through heritage, eco-tourism, and MICE segment promotion.</p>",author:"Business Bureau",date:"May 24, 2026",readTime:"4 min read",imgLabel:"GOA TOURISM RECORD",featured:false},
  {id:6,cat:"goa",title:"Goa Police Launch 'Safe Tourist' App for Real-Time Crime Reporting",summary:"The Goa Police Force launched a new app allowing tourists to report crime, lost documents, and emergencies with GPS location sharing.",body:"<p>The Goa Police Force officially launched the 'Safe Tourist' mobile application, allowing visitors to report crimes, medical emergencies, and accidents in real time with automatic GPS location sharing.</p><p>DGP Jaspal Singh said the app aims to make Goa one of the safest tourism destinations in Asia. Available free on Android and iOS.</p><h3>Key Features</h3><p>One-tap SOS button alerts the nearest police station. The app includes lost passport reporting, beach safety alerts, and interfaces in English, Hindi, and Russian.</p><p>A pilot in North Goa from January to March logged 1,200 incidents, with 94% receiving police response within 20 minutes.</p>",author:"Jangoa Desk",date:"May 23, 2026",readTime:"3 min read",imgLabel:"SAFE TOURIST APP",featured:false},
  {id:7,cat:"education",title:"Goa Board Class 10 Results 2026: 96.8% Pass Rate, Girls Outshine Boys",summary:"The Goa Board of Secondary and Higher Secondary Education declared Class 10 results with a record 96.8% pass rate, with girls achieving a higher pass percentage.",body:"<p>The Goa Board of Secondary and Higher Secondary Education (GBSHSE) declared Class 10 results for 2026, recording a historic 96.8% pass rate across the state.</p><p>Girls achieved a pass rate of 97.4% compared to 96.1% for boys, continuing a trend of female academic excellence in Goa.</p><h3>Top Performers</h3><p>Priya Naik from Panaji scored a perfect 100 in Mathematics and scored 594 out of 600 overall to top the state. Three students from Margao secured the second position.</p><p>Education Minister Rohan Khaunte congratulated students and announced scholarship opportunities for top performers from economically weaker sections.</p>",author:"Education Desk",date:"May 22, 2026",readTime:"3 min read",imgLabel:"GOA BOARD RESULTS",featured:false},
  {id:8,cat:"health",title:"Goa Medical College Introduces AI-Powered Diagnostic Centre",summary:"GMC Panaji has launched Goa's first AI-powered diagnostic centre, reducing patient wait times by 60% and improving early disease detection rates.",body:"<p>Goa Medical College (GMC) in Panaji has inaugurated the state's first Artificial Intelligence-powered diagnostic centre, a landmark development for public healthcare in Goa.</p><p>The centre uses AI algorithms to analyse X-rays, CT scans, and MRIs with greater speed and accuracy, reducing patient wait times from 3-4 hours to under 40 minutes.</p><h3>Impact on Patients</h3><p>Early pilot results show the AI system detected early-stage tuberculosis with 98.2% accuracy and flagged potential cancerous lesions in chest scans that might otherwise have been missed.</p><p>Health Minister Viswaraje Rane said the government plans to replicate the model in district hospitals across Goa by 2027.</p>",author:"Health Desk",date:"May 21, 2026",readTime:"4 min read",imgLabel:"GMC AI DIAGNOSTIC",featured:false},
  {id:9,cat:"sports",title:"Goa Hosts India's First Beach Olympics Qualifier at Miramar",summary:"Miramar Beach in Panaji hosted the national qualifier for India's first Beach Olympics team selection, with over 200 athletes competing across 6 beach sports.",body:"<p>Miramar Beach in Panaji buzzed with athletic energy as it hosted India's first-ever Beach Olympics qualifier event, with over 200 athletes competing across six beach sports disciplines.</p><p>Events included beach volleyball, beach football, beach wrestling, open water swimming, beach tennis, and kayaking.</p><h3>Goa Athletes Shine</h3><p>Goan athletes dominated the beach volleyball and swimming categories. Ricardo Fernandes of South Goa won gold in 100m open water swimming.</p><p>The Sports Authority of India (SAI) will use results to finalize India's beach sports contingent for upcoming international competitions.</p>",author:"Sports Desk",date:"May 20, 2026",readTime:"3 min read",imgLabel:"BEACH OLYMPICS GOA",featured:false},
  {id:10,cat:"business",title:"Startup Goa 2026: 42 New Tech Startups Receive State Government Funding",summary:"The Goa government's startup ecosystem fund disbursed ₹18 crore to 42 technology startups in the state's annual startup investment drive.",body:"<p>The Goa state government's Startup Goa initiative has disbursed ₹18 crore to 42 technology startups in the annual funding round, marking a 60% increase from last year's 26 funded startups.</p><p>Sectors receiving funding include agritech, tourism technology, fisheries management, and sustainable energy.</p><h3>Notable Startups</h3><p>GoaFresh, a farm-to-table delivery platform connecting Goan farmers directly with consumers, received the largest grant of ₹85 lakh. FishTrack, which uses IoT sensors to monitor fishing boat safety, received ₹72 lakh.</p><p>IT Minister Rohan Khaunte said the government aims to make Goa a top-5 startup hub in India by 2030.</p>",author:"Business Bureau",date:"May 19, 2026",readTime:"4 min read",imgLabel:"STARTUP GOA 2026",featured:false},
  {id:11,cat:"entertainment",title:"Konkani Film 'Aum Goenkar' Wins Best Regional Film at National Awards",summary:"The Konkani film 'Aum Goenkar' has won the Best Regional Film award at the 73rd National Film Awards, putting Goa's cinema on the national map.",body:"<p>The Konkani film 'Aum Goenkar' (I Am a Goan) has won the Best Regional Film award at the 73rd National Film Awards ceremony held in New Delhi, bringing national recognition to Goa's rich cinematic heritage.</p><p>Director Subodh Kerkar, also a noted visual artist, called the win &quot;a victory for Konkani culture and language.&quot;</p><h3>Film Synopsis</h3><p>The film follows a young Goan fisherman caught between traditional values and modern economic pressures, set against the backdrop of Goa's changing coastline. It was shot entirely on location in coastal Goa over 90 days.</p><p>Lead actor Antonio Rodrigues won Best Actor in a Regional Film category, marking a historic double win for Goa.</p>",author:"Entertainment Desk",date:"May 18, 2026",readTime:"3 min read",imgLabel:"KONKANI FILM AWARD",featured:false},

function render(){
  let body="";
  if(curPage==="article"&&curArticle) body=renderArticle(curArticle);
  else if(curPage==="home") body=renderHome();
  else if(curPage==="about") body=renderAbout();
  else if(curPage==="contact") body=renderContact();
  else if(curPage==="videos") body=renderVideos();
  else if(curPage==="search") body=renderSearch(searchQ);
  else if(CATS[curPage]) body=renderCatPage(curPage);
  else body=renderHome();

  document.body.innerHTML=renderHeader()+`<main>${body}</main>`+renderFooter();
  updateTime();
  window.scrollTo(0,0);
}

function nav(page){
  curPage=page; curArticle=null; searchQ="";
  if(page!=="search") curCat=(CATS[page]?page:null);
  render();
}

function openArt(id){
  const a=articles.find(x=>x.id===id);
  if(!a) return;
  curArticle=a; curPage="article"; curCat=a.cat;
  render();
}

function doSearch(){
  const q=(document.getElementById("sq")||{}).value||"";
  if(!q.trim()) return;
  searchQ=q; curPage="search";
  render();
}

function submitContact(){
  const n=document.getElementById("c-name").value;
  const e=document.getElementById("c-email").value;
  if(!n||!e){alert("Please fill in name and email.");return;}
  document.getElementById("c-success").style.display="block";
  document.getElementById("c-name").value="";
  document.getElementById("c-email").value="";
  document.getElementById("c-msg").value="";
}

function updateTime(){
  const el=document.getElementById("dtbar");
  if(el){
    const now=new Date();
    el.textContent=now.toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})+" | "+now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
  }
}

function openAdmin(){
  window.open("jangoa-admin.html","_blank");
}

window.onload=function(){render();setInterval(updateTime,60000)};
</script>
</body>
</html>
